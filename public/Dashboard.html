<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini CRM — Dashboard</title>
<style>
  :root {
    --peacock: #005f73;
    --peacock-dark: #013a4a;
    --peacock-light: #0a9396;
    --parrot: #4caf3d;
    --parrot-light: #7ed957;
    --yellow: #ffd60a;
    --yellow-light: #fff3b0;
    --white: #ffffff;
    --text-dark: #0b2027;
    --gray: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    background: var(--yellow-light);
    color: var(--text-dark);
    min-height: 100vh;
  }

  .topbar {
    background: var(--peacock);
    color: var(--white);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .topbar h1 { font-size: 1.3rem; }
  .topbar h1 span { color: var(--yellow); }
  .topbar .right { display: flex; align-items: center; gap: 16px; }
  .topbar .user { font-weight: 600; font-size: 0.9rem; }
  .topbar button {
    background: var(--parrot);
    color: var(--white);
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .topbar button:hover { background: #3d9530; }

  .container { padding: 26px; max-width: 1300px; margin: 0 auto; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 26px;
  }
  .stat-card {
    background: var(--white);
    border-radius: 14px;
    padding: 18px 20px;
    border-left: 6px solid var(--peacock);
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .stat-card:nth-child(2) { border-left-color: var(--parrot); }
  .stat-card:nth-child(3) { border-left-color: var(--yellow); }
  .stat-card:nth-child(4) { border-left-color: var(--peacock-light); }
  .stat-card .label { font-size: 0.8rem; color: var(--gray); font-weight: 600; }
  .stat-card .value { font-size: 1.8rem; font-weight: 800; color: var(--peacock-dark); margin-top: 4px; }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .controls input, .controls select {
    padding: 10px 14px;
    border: 2px solid var(--peacock);
    border-radius: 10px;
    font-size: 0.9rem;
    outline: none;
  }
  .controls input { flex: 1; min-width: 200px; }

  .table-card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead { background: var(--peacock); color: var(--white); }
  th, td { padding: 12px 14px; text-align: left; font-size: 0.88rem; }
  tbody tr { border-bottom: 1px solid #eee; }
  tbody tr:hover { background: #f9fdf7; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>🦜 Mini <span>CRM</span> Dashboard</h1>
  <div class="right">
    <span class="user" id="userLabel"></span>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<div class="container">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Total Leads</div>
      <div class="value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="label">New</div>
      <div class="value" id="statNew">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Contacted</div>
      <div class="value" id="statContacted">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Converted</div>
      <div class="value" id="statConverted">0</div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="🔍 Search by name or email..." />
    <select id="statusFilter">
      <option value="all">All Statuses</option>
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="converted">Converted</option>
    </select>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Source</th>
          <th>Status</th>
          <th>Submitted</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="leadsTableBody">
        <tr class="empty-row"><td colspan="8">Loading leads...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  let allLeads = [];

  async function checkAuth() {
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (!res.ok) {
        window.location.href = '/login';
        return;
      }
      const data = await res.json();
      document.getElementById('userLabel').textContent = '👤 ' + data.username;

      loadStats();
      loadLeads();
    } catch (err) {
      console.error(err);
      window.location.href = '/login';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login';
  });

  async function loadStats() {
    try {
      const res = await fetch('/api/leads/stats', { credentials: 'include' });
      if (!res.ok) return;
      const data = await res.json();

      document.getElementById('statTotal').textContent = data.total || 0;

      const map = { new: 0, contacted: 0, converted: 0 };
      (data.statusCounts || []).forEach(s => {
        if(s._id) map[s._id.toLowerCase()] = s.count;
      });

      document.getElementById('statNew').textContent = map.new;
      document.getElementById('statContacted').textContent = map.contacted;
      document.getElementById('statConverted').textContent = map.converted;
    } catch (err) {
      console.error("Stats error:", err);
    }
  }

  async function loadLeads() {
    try {
      const res = await fetch('/api/leads', { credentials: 'include' });
      if (!res.ok) return;

      allLeads = await res.json();
      filterAndRenderTable();
    } catch (err) {
      console.error("Leads error:", err);
    }
  }

  // FIXED: Changed status column into an editable dropdown menu
  function filterAndRenderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const tbody = document.getElementById('leadsTableBody');

    let filtered = allLeads;

    if (search) {
      filtered = filtered.filter(l => 
        (l.name && l.name.toLowerCase().includes(search)) || 
        (l.email && l.email.toLowerCase().includes(search))
      );
    }

    if (status !== 'all') {
      filtered = filtered.filter(l => l.status && l.status.toLowerCase() === status);
    }

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:20px;">No matching leads found</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(lead => {
      const currentStatus = (lead.status || 'new').toLowerCase();
      
      return `
        <tr>
          <td>${lead.name || ''}</td>
          <td>${lead.email || ''}</td>
          <td>${lead.phone || '-'}</td>
          <td>${lead.source || ''}</td>
          <td>
            <select class="status-select" onchange="updateStatus('${lead._id}', this.value)" style="padding: 4px; border-radius: 4px; border: 1px solid #005f73;">
              <option value="new" ${currentStatus === 'new' ? 'selected' : ''}>New</option>
              <option value="contacted" ${currentStatus === 'contacted' ? 'selected' : ''}>Contacted</option>
              <option value="converted" ${currentStatus === 'converted' ? 'selected' : ''}>Converted</option>
            </select>
          </td>
          <td>${new Date(lead.createdAt).toLocaleDateString()}</td>
          <td>${lead.notes ? lead.notes.length : 0}</td>
          <td>
            <button style="background:#d9534f; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="deleteLead('${lead._id}')">Delete</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  // NEW FEATURE: Sends the new selected status to your backend database
  async function updateStatus(id, newStatus) {
    try {
      const res = await fetch(`/api/leads/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ status: newStatus })
      });

      if (res.ok) {
        // Refresh leads list and counters automatically
        loadLeads();
        loadStats();
      } else {
        alert("Failed to update status.");
      }
    } catch (err) {
      console.error("Update error:", err);
    }
  }

  async function deleteLead(id) {
    if(!confirm("Are you sure you want to delete this lead?")) return;
    try {
      await fetch(`/api/leads/${id}`, { method: 'DELETE', credentials: 'include' });
      loadLeads();
      loadStats();
    } catch (err) {
      console.error(err);
    }
  }

  document.getElementById('searchInput').addEventListener('input', filterAndRenderTable);
  document.getElementById('statusFilter').addEventListener('change', filterAndRenderTable);

  checkAuth();
</script>
</body>
</html>
