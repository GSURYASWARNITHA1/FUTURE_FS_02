<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini CRM — Submit a Request</title>
<style>
  :root {
    --peacock: #005f73;
    --peacock-dark: #013a4a;
    --parrot: #4caf3d;
    --parrot-light: #7ed957;
    --yellow: #ffd60a;
    --yellow-light: #fff3b0;
    --white: #ffffff;
    --text-dark: #0b2027;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--peacock) 0%, var(--peacock-dark) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--yellow-light);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    max-width: 520px;
    width: 100%;
    overflow: hidden;
    border: 4px solid var(--yellow);
  }

  .header {
    background: var(--parrot);
    background: linear-gradient(120deg, var(--parrot) 0%, var(--parrot-light) 100%);
    padding: 28px 30px;
    text-align: center;
    border-bottom: 5px solid var(--yellow);
  }

  .header h1 {
    color: var(--white);
    font-size: 1.6rem;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  .header p {
    color: var(--peacock-dark);
    margin-top: 6px;
    font-size: 0.92rem;
    font-weight: 600;
  }

  form {
    padding: 28px 30px 32px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--peacock-dark);
    margin-bottom: 6px;
    margin-top: 16px;
  }

  label:first-of-type { margin-top: 0; }

  input, select, textarea {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--peacock);
    border-radius: 10px;
    font-size: 0.95rem;
    color: var(--text-dark);
    background: var(--white);
    outline: none;
    transition: all 0.2s ease;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--parrot);
    box-shadow: 0 0 0 3px rgba(76,175,61,0.25);
  }

  textarea { resize: vertical; min-height: 80px; }

  button {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: var(--peacock);
    color: var(--white);
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
    letter-spacing: 0.4px;
  }

  button:hover { background: var(--peacock-dark); transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .msg {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    text-align: center;
    display: none;
  }

  .msg.success {
    background: #e3f9e0;
    color: #1d6b1d;
    border: 2px solid var(--parrot);
    display: block;
  }

  .msg.error {
    background: #fde2e2;
    color: #9c1f1f;
    border: 2px solid #c94a4a;
    display: block;
  }

  .footer-link {
    text-align: center;
    margin-top: 18px;
    font-size: 0.82rem;
  }

  .footer-link a {
    color: var(--peacock);
    font-weight: 700;
    text-decoration: none;
  }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🌟 Get in Touch</h1>
    <p>Submit your request and our team will reach out to you</p>
  </div>

  <form id="leadForm">
    <label for="name">Full Name *</label>
    <input type="text" id="name" name="name" placeholder="Your name" required />

    <label for="email">Email Address *</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required />

    <label for="phone">Phone Number</label>
    <input type="text" id="phone" name="phone" placeholder="Optional" />

    <label for="source">How did you hear about us?</label>
    <select id="source" name="source">
      <option value="Website">Website</option>
      <option value="Referral">Referral</option>
      <option value="Social Media">Social Media</option>
      <option value="Ad Campaign">Ad Campaign</option>
      <option value="Other">Other</option>
    </select>

    <label for="message">Your Message</label>
    <textarea id="message" name="message" placeholder="Tell us what you need..."></textarea>

    <button type="submit" id="submitBtn">Submit Request</button>

    <div class="msg" id="msgBox"></div>
  </form>

  <div class="footer-link">
    Admin? <a href="/login">Login here</a>
  </div>
</div>

<script>
  const form = document.getElementById('leadForm');
  const msgBox = document.getElementById('msgBox');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    msgBox.className = 'msg';
    msgBox.textContent = '';

    const payload = {
      name: form.name.value.trim(),
      email: form.email.value.trim(),
      phone: form.phone.value.trim(),
      source: form.source.value,
      message: form.message.value.trim()
    };

    try {
      const res = await fetch('/api/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (res.ok) {
        msgBox.className = 'msg success';
        msgBox.textContent = '✅ Thank you! Your request has been submitted.';
        form.reset();
      } else {
        msgBox.className = 'msg error';
        msgBox.textContent = '❌ ' + (data.error || 'Something went wrong.');
      }
    } catch (err) {
      msgBox.className = 'msg error';
      msgBox.textContent = '❌ Network error. Please try again.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Request';
    }
  });
</script>

</body>
</html>
