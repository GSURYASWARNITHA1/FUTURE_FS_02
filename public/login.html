<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini CRM — Admin Login</title>
<style>
  :root {
    --peacock: #005f73;
    --peacock-dark: #013a4a;
    --parrot: #4caf3d;
    --parrot-light: #7ed957;
    --yellow: #ffd60a;
    --yellow-light: #fff3b0;
    --white: #ffffff;
    --text-dark: #0b2027;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--peacock-dark) 0%, var(--peacock) 60%, var(--parrot) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--yellow-light);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    max-width: 400px;
    width: 100%;
    overflow: hidden;
    border: 4px solid var(--yellow);
  }

  .header {
    background: var(--peacock);
    padding: 30px;
    text-align: center;
    border-bottom: 5px solid var(--yellow);
  }

  .header .icon {
    font-size: 2.4rem;
  }

  .header h1 {
    color: var(--white);
    font-size: 1.5rem;
    margin-top: 8px;
  }

  .header p {
    color: var(--yellow);
    font-size: 0.85rem;
    margin-top: 4px;
    font-weight: 600;
  }

  form { padding: 28px 30px 32px; }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--peacock-dark);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }

  input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--peacock);
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
  }

  input:focus {
    border-color: var(--parrot);
    box-shadow: 0 0 0 3px rgba(76,175,61,0.25);
  }

  button {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: var(--parrot);
    color: var(--white);
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover { background: #3d9530; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .msg {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    text-align: center;
    display: none;
  }

  .msg.error {
    background: #fde2e2;
    color: #9c1f1f;
    border: 2px solid #c94a4a;
    display: block;
  }

  .footer-link {
    text-align: center;
    margin-top: 16px;
    font-size: 0.8rem;
  }
  .footer-link a { color: var(--peacock); font-weight: 700; text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="icon">🔐</div>
    <h1>Admin Login</h1>
    <p>Mini CRM Dashboard Access</p>
  </div>

  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" />

    <button type="submit" id="loginBtn">Login</button>

    <div class="msg error" id="msgBox"></div>
  </form>

  <div class="footer-link">
    <a href="/">← Back to Request Form</a>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const msgBox = document.getElementById('msgBox');
  const loginBtn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';
    msgBox.style.display = 'none';

    try {
      const res = await fetch('fetch('https://future-fs-02-tm59.onrender.com/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          username: form.username.value.trim(),
          password: form.password.value
        })
      });
      const data = await res.json();

      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        msgBox.style.display = 'block';
        msgBox.textContent = '❌ ' + (data.error || 'Login failed');
      }
    } catch (err) {
      msgBox.style.display = 'block';
      msgBox.textContent = '❌ Network error. Please try again.';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });
</script>

</body>
</html>
